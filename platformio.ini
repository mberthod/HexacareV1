[platformio]
default_envs = capture_audio
src_dir = main
; Les composants IDF locaux sont dans ./components/ (découverte CMake ESP-IDF).
; Ne pas utiliser lib_extra_dirs ici : option non reconnue / inutile pour espidf.

[env]
; Cible sources / AGENTS.md : ESP-IDF 6.0+ (API « new » drivers : I2S = i2s_std.h, etc.).
;
; PlatformIO : la plateforme `espressif32` embarque un paquet `framework-espidf`
; numéroté séparément (ex. 6.9.0 PIO → IDF 5.3.x ; 6.13.0 PIO → IDF 5.5.x).
; Il n’y a pas encore de release PIO officielle annoncée avec ESP-IDF 6.0.0 ;
; pour compiler avec IDF 6.0 : utiliser `idf.py` + $IDF_PATH pointant sur v6.0,
; ou surcharger ici `platform_packages` dès qu’Espressif publiera framework-espidf 6.x.
;
; 6.0.0 (plateforme PIO) ≠ ESP-IDF 6.0 — attention à la confusion de numéros.
; 6.9.0 reste un bon compromis (IDF 5.3.x, idf-component-manager / Python 3.14).
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = espidf
board_build.partitions = partitions.csv
board_upload.flash_size = 16MB
; Débit série hôte (moniteur / flash esptool / scripts). Aligner Arduino / pyserial sur la même valeur.
; 921600 = standard courant ; essai 2000000 si câble/USB stables (sinon revenir à 921600).
monitor_speed = 921600
upload_speed = 921600
monitor_filters = esp32_exception_decoder, colorize

; Pipeline complet (audio + lidar + orchestrateur + mesh).
; Gateway : ajouter par ex. -DAPP_IS_ROOT=1 -DAPP_NODE_ID=0x0001
[env:production]
build_flags =
    -DMBH_MODE_FULL=1
    -DBOARD_HAS_PSRAM

; Même binaire « full » + flux USB pour lexa_live_monitor.py (LXCS + LXCL + JSON).
; Fermer le moniteur série intégré ; débit USB élevé (voir tools/lexa_live_config.example.json).
[env:production_usb_telemetry]
build_flags =
    -DMBH_MODE_FULL=1
    -DMBH_USB_TELEMETRY_STREAM=1
    -DBOARD_HAS_PSRAM
monitor_filters = esp32_exception_decoder

; Full stack + lignes ASCII FRAME: (mm) sur USB série — pour tools/read_lexa_tof_frame.py.
; Ne pas activer en même temps que MBH_USB_TELEMETRY_STREAM (flux binaire).
[env:production_tof_frame_ascii]
build_flags =
    -DMBH_MODE_FULL=1
    -DMBH_SERIAL_ASCII_TOF_FRAME=1
    -DBOARD_HAS_PSRAM
monitor_speed = 115200
upload_speed = 115200
monitor_filters = esp32_exception_decoder

[env:capture_audio]
build_flags =
    -DMBH_MODE_CAPTURE_AUDIO=1
    -DBOARD_HAS_PSRAM
    -DMBH_DISABLE_MESH=1

; ASCII : 1 ligne = moyenne sur N echantillons (lisible sur traceur). Fidelite 16 kHz -> WAV :
;   pio run -e capture_audio_host -t upload
;   python3 tools/record_lexa_audio.py --port /dev/ttyACM0 -o test.wav
[env:capture_audio_plot]
build_flags =
    -DMBH_MODE_CAPTURE_AUDIO=1
    -DBOARD_HAS_PSRAM
    -DMBH_DISABLE_MESH=1
    -DMBH_CAPTURE_ASCII_SERIAL_PLOTTER=1
monitor_filters = esp32_exception_decoder

; Flux binaire LXCA+PCM sur USB : illisible dans le « Serial Monitor » (ce n’est pas du texte).
; Ne pas ouvrir le moniteur pour « entendre » l’audio. Fermer le moniteur, puis :
;   python3 tools/record_lexa_audio.py --port /dev/ttyACM0 -o capture.wav
[env:capture_audio_host]
build_flags =
    -DMBH_MODE_CAPTURE_AUDIO=1
    -DBOARD_HAS_PSRAM
    -DMBH_DISABLE_MESH=1
    -DMBH_CAPTURE_BINARY_TO_STDOUT=1
; Sans colorize : moins de séquences d’échappement si tu regardes le port en brut (déconseillé).
monitor_filters = esp32_exception_decoder

; PCM int16 continu (pas de LXCA) — enregistrement : record_lexa_audio.py --raw-pcm --skip-bytes …
[env:capture_audio_raw]
build_flags =
    -DMBH_MODE_CAPTURE_AUDIO=1
    -DBOARD_HAS_PSRAM
    -DMBH_DISABLE_MESH=1
    -DMBH_CAPTURE_RAW_PCM_TO_STDOUT=1
monitor_filters = esp32_exception_decoder

[env:capture_lidar]
build_flags =
    -DMBH_MODE_CAPTURE_LIDAR=1
    -DBOARD_HAS_PSRAM
    -DMBH_DISABLE_MESH=1

[env:capture_lidar_host]
build_flags =
    -DMBH_MODE_CAPTURE_LIDAR=1
    -DBOARD_HAS_PSRAM
    -DMBH_DISABLE_MESH=1
    -DMBH_CAPTURE_BINARY_TO_STDOUT=1
monitor_filters = esp32_exception_decoder

[env:model_audio]
build_flags =
    -DMBH_MODE_MODEL_AUDIO=1
    -DBOARD_HAS_PSRAM
    -DMBH_DISABLE_MESH=1

[env:model_lidar]
build_flags =
    -DMBH_MODE_MODEL_LIDAR=1
    -DBOARD_HAS_PSRAM
    -DMBH_DISABLE_MESH=1

[env:model_both]
build_flags =
    -DMBH_MODE_MODEL_BOTH=1
    -DBOARD_HAS_PSRAM
    -DMBH_DISABLE_MESH=1

[env:mesh_only]
build_flags =
    -DMBH_MODE_MESH_ONLY=1
    -DBOARD_HAS_PSRAM

[env:test_mesh]
build_flags =
    -DMBH_MODE_TEST_MESH=1
    -DBOARD_HAS_PSRAM

[env:debug_mfcc]
build_flags =
    -DMBH_MODE_DEBUG_MFCC=1
    -DBOARD_HAS_PSRAM
    -DMBH_DISABLE_MESH=1
